name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      # Advisory until the 141-error lint debt is paid (master plan task W0.6),
      # then remove continue-on-error to make lint blocking again.
      - run: npm run lint
        continue-on-error: true
