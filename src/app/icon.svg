<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <clipPath id="face"><circle cx="16" cy="16" r="11"/></clipPath>
    <linearGradient id="sky" x1="16" y1="4" x2="16" y2="16.5" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00d4ff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0a4a5c" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="earth" x1="16" y1="16.5" x2="16" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5a623" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#b08a22" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <!-- cockpit panel -->
  <rect width="32" height="32" rx="7" fill="url(#panel)"/>
  <rect x="1.25" y="1.25" width="29.5" height="29.5" rx="6" fill="none" stroke="#2a3040" stroke-width="1.25"/>

  <!-- attitude-indicator face, banked ~8° (cyan sky over amber earth) -->
  <g clip-path="url(#face)">
    <g transform="rotate(-8 16 16)">
      <rect x="-8" y="-8" width="48" height="24.5" fill="url(#sky)"/>
      <rect x="-8" y="16.5" width="48" height="48" fill="url(#earth)"/>
      <rect x="-8" y="15.7" width="48" height="0.8" fill="#080c12" opacity="0.55"/>
      <rect x="11.5" y="10.8" width="9" height="0.7" fill="#ffffff" opacity="0.35"/>
      <rect x="13" y="20.6" width="6" height="0.7" fill="#080c12" opacity="0.3"/>
    </g>
  </g>

  <!-- bezel ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#3a4456" stroke-width="1.5"/>

  <!-- aircraft-reference wings (dark backing + amber, fixed level) -->
  <g stroke="#080c12" stroke-width="3.4" stroke-linecap="round" opacity="0.85">
    <line x1="8" y1="16" x2="12.7" y2="16"/>
    <line x1="19.3" y1="16" x2="24" y2="16"/>
  </g>
  <g stroke="#f5a623" stroke-width="1.9" stroke-linecap="round">
    <line x1="8" y1="16" x2="12.7" y2="16"/>
    <line x1="19.3" y1="16" x2="24" y2="16"/>
  </g>
  <circle cx="16" cy="16" r="2" fill="#080c12" opacity="0.85"/>
  <circle cx="16" cy="16" r="1.3" fill="#f5a623"/>

  <!-- bank pointer -->
  <path d="M16 4.2 L14.5 7.1 L17.5 7.1 Z" fill="#f5a623" stroke="#080c12" stroke-width="0.4"/>
</svg>
